id: sourcerer.refs.resolve
type: esql
description: resolve a git ref (branch or tag) to its indexed commit(s) in repo(s)
tags: []
configuration:
  query: |-
    // Look up the ref marker(s). Branches and tags are stored only here (not on
    // file/line docs), so resolve a ref like `main` or `v1.2.3` to its commit,
    // then pass that commit to cat/head/tail/grep/search.
    FROM sourcerer-v1-refs*
    | WHERE git.org LIKE ?git_org
        AND git.repo LIKE ?git_repo
        AND git.ref LIKE ?git_ref
        AND git.ref_type LIKE ?git_ref_type

    // Most recent first so a moved branch's current commit leads
    | KEEP git.org, git.repo, git.ref, git.ref_type, git.commit, git.commit_date, indexed_at
    | SORT indexed_at DESC
    | LIMIT 1000
  params:
    git_org:
      type: string
      description: Filter by git org(s)
      optional: true
      defaultValue: "*"
    git_repo:
      type: string
      description: Filter by git repo(s)
      optional: true
      defaultValue: "*"
    git_ref:
      type: string
      description: The ref name to resolve, e.g. "main" or "v1.2.3" (supports * and ? wildcards)
      optional: true
      defaultValue: "*"
    git_ref_type:
      type: string
      description: Filter by ref type, "branch" or "tag" (supports * and ? wildcards)
      optional: true
      defaultValue: "*"
