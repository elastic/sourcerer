id: sourcerer.files.cat
type: esql
description: cat repo file(s); each line is prefixed with its 1-indexed line number (disable with show_line_numbers=false)
tags: []
configuration:
  query: |-
    // Scope the search
    FROM sourcerer-lines
    | WHERE MATCH(git.org, ?git_org)
        AND git.repo LIKE ?git_repo
        AND git.commit LIKE ?git_commit
        AND file.path LIKE ?file_path

    // Enforce glob depth for * and ** on file.path.
    // Without this, "src/*/Job.java" would match files at any depth,
    // not just three path segments, because a wildcard * in ES|QL
    // treats "/" as a regular character.
    // 
    //   _fp_is_recursive  Does the pattern contain "**"?
    //   _fp_segs          How many segments does the pattern have? ("src/*/Job.java" = 3)
    //   _file_segs        How many segments does this indexed file.path have?
    //   
    // WHERE _fp_is_recursive OR _file_segs == _fp_segs keeps the file if the
    // pattern is recursive (** means any depth is intended) or if the file
    // depth exactly matches the pattern depth (equal depths mean a * could only
    // have matched within a single segment).
    | EVAL _fp_is_recursive = ?file_path != REPLACE(?file_path, "[*][*]", "")
    | EVAL _fp_segs = LENGTH(?file_path) - LENGTH(REPLACE(?file_path, "/", "")) + 1
    | EVAL _file_segs = MV_COUNT(SPLIT(file.path, "/"))
    | WHERE _fp_is_recursive OR _file_segs == _fp_segs

    // Construct the output for each file based on its lines.
    // _sortkey: internal 10-digit zero-padded line number so (a) duplicate lines stay unique
    // and (b) lexical sort == line order. Stripped back off after the STATS/MV_CONCAT below.
    | EVAL _sortkey = RIGHT(CONCAT("0000000000", TO_STRING(line.number)), 10)
    // _display: optional visible grep -n style prefix ("<line>:<content>"); survives the strip.
    | EVAL _display = CASE(?show_line_numbers == true, CONCAT(TO_STRING(line.number), ":", line.content), line.content)
    | EVAL pair = CONCAT(_sortkey, _display)

    // Collapse each file's lines into one ordered, deduped-safe list (the prefix prevents VALUES from dropping repeated lines)
    | STATS pairs = MV_SORT(VALUES(pair))
        BY git.org, git.repo, git.commit, file.path

    // Join lines with newlines, then strip the 10-digit sort key off each line
    // (the visible show_line_numbers prefix, if any, is the 11th+ chars and is preserved)
    | EVAL file_contents = SUBSTRING(REPLACE(CONCAT("\n", MV_CONCAT(pairs, "\n")), "\n[0-9]{10}", "\n"), 2)

    // Format the response
    | KEEP git.org, git.repo, git.commit, file.path, file_contents
    | SORT git.org, git.repo, git.commit, file.path
  params:
    git_org:
      type: string
      description: Filter by git org(s)
      optional: true
      defaultValue: "*"
    git_repo:
      type: string
      description: Filter by git repo(s) (supports * wildcards)
      optional: true
      defaultValue: "*"
    git_commit:
      type: string
      description: Filter by git commit(s) (supports * wildcards)
      optional: true
      defaultValue: "*"
    file_path:
      type: string
      description: File path(s) to cat (supports * and ** glob syntax, e.g. src/test, src/*/resources, src/**, src/**/*.xml)
      optional: false
    show_line_numbers:
      type: boolean
      description: Prefix each returned line with its 1-indexed line number (grep -n style, "<line>:<content>")
      optional: true
      defaultValue: true
