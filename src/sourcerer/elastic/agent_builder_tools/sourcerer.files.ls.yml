id: sourcerer.files.ls
type: esql
description: ls files and directories under a given path or glob pattern in a repository
tags: []
configuration:
  query: |-
    // Scope the search
    FROM sourcerer-files
    | WHERE MATCH(git.org, ?git_org)
        AND git.repo LIKE ?git_repo
        AND git.commit LIKE ?git_commit

    // Enforce glob depth for * and ** on file.path.
    // Without this, "src/*/Job.java" would match files at any depth,
    // not just three path segments, because a wildcard * in ES|QL
    // treats "/" as a regular character.
    // 
    // ls uses a prefix approach for non-recursive patterns: truncate file.path
    // to the pattern's depth, then match the prefix against the pattern.
    // This confines * to one segment and enables directory listing.
    // Files deeper than the pattern are matched by prefix and later collapsed
    // to their immediate child name. For recursive patterns (**),
    // match file.path directly.
    //
    //   fp                  Input pattern with any trailing "/" stripped
    //   is_recursive        Does the pattern contain "**"?
    //   num_input_segments  How many segments does the pattern have? ("src/*/Job.java" = 3)
    //   segments            Indexed file.path split into parts
    //   num_segments        How many segments does this indexed file.path have?
    //   prefix              Indexed file.path truncated to num_input_segments depth
    //
    // WHERE keeps the file if the pattern is recursive (any depth intended, match
    // file.path directly) or if the file is at or below the pattern depth and its
    // truncated prefix matches (prefix match confines * to a single segment; >= allows
    // files at the pattern's own depth too, e.g. "src/*.xml" matching a file directly).
    | EVAL fp = CASE(ENDS_WITH(?file_path, "/"), LEFT(?file_path, LENGTH(?file_path) - 1), ?file_path)
    | EVAL is_recursive = fp != REPLACE(fp, "[*][*]", "")
    | EVAL num_input_segments = LENGTH(fp) - LENGTH(REPLACE(fp, "/", "")) + 1
    | EVAL segments = SPLIT(file.path, "/")
    | EVAL num_segments = MV_COUNT(segments)
    | EVAL prefix = MV_CONCAT(MV_SLICE(segments, 0, num_input_segments - 1), "/")
    | WHERE (
        is_recursive AND file.path LIKE ?file_path
      ) OR (
        NOT is_recursive
        AND num_segments >= num_input_segments
        AND CASE(ENDS_WITH(?file_path, "/"), CONCAT(prefix, "/"), prefix) LIKE ?file_path
      )

    // Emit the full path (recursive), the file's own path (at pattern depth), or
    // the immediate child path (deeper files) for directory-listing semantics.
    | EVAL name = CASE(
      is_recursive, file.path,
      num_segments == num_input_segments, file.path,
      MV_CONCAT(MV_SLICE(segments, 0, num_input_segments), "/")
    )

    // A name is a directory only if the file lives more than one level below the pattern.
    | EVAL is_dir = CASE(
      is_recursive, false,
      num_segments == num_input_segments, false,
      num_segments > num_input_segments + 1
    )

    // Collapse to one row per unique entry — this turns raw paths into an ls listing.
    | STATS files = COUNT(*), bytes = SUM(file.size) BY name, is_dir

    // Append a trailing "/" to directory entries so they read like ls output.
    | EVAL name = CASE(is_dir, CONCAT(name, "/"), name)

    // Format the response
    | SORT is_dir DESC, name
    | KEEP name
    | LIMIT 1000000
  params:
    git_org:
      type: string
      description: Filter by git org(s)
      optional: true
      defaultValue: "*"
    git_repo:
      type: string
      description: Filter by git repo(s) (supports * wildcards)
      optional: true
      defaultValue: "*"
    git_commit:
      type: string
      description: Filter by git commit(s) (supports * wildcards)
      optional: true
      defaultValue: "*"
    file_path:
      type: string
      description: File path to ls (supports * and ** glob syntax, e.g. src/test, src/*/resources, src/**, src/**/*.xml)
      optional: true
      defaultValue: "*"
