id: sourcerer.refs.list
type: esql
description: list the git refs (branches, tags) indexed for org(s)/repo(s)
tags: []
configuration:
  query: |-
    // List the indexed refs. Every filter is wildcard-friendly and defaults to "*",
    // so calling with no params lists every ref in every repo. Narrow with any combo
    // of org / repo / ref / ref_type / commit to browse what's available to
    // cat/head/tail/grep/search.
    FROM sourcerer-v1-refs*
    | WHERE git.org LIKE ?git_org
        AND git.repo LIKE ?git_repo
        AND git.commit LIKE ?git_commit
        AND git.ref LIKE ?git_ref
        AND git.ref_type LIKE ?git_ref_type

    // Most recent first so a moved branch's current commit leads
    | KEEP git.org, git.repo, git.ref, git.ref_type, git.commit, git.commit_date, status, files_count, lines_count, indexed_at
    | SORT indexed_at DESC
    | LIMIT 1000
  params:
    git_org:
      type: string
      description: Filter by git org(s) (supports * wildcards)
      optional: true
      defaultValue: "*"
    git_repo:
      type: string
      description: Filter by git repo(s) (supports * wildcards)
      optional: true
      defaultValue: "*"
    git_commit:
      type: string
      description: Filter by git commit(s) (supports * wildcards)
      optional: true
      defaultValue: "*"
    git_ref:
      type: string
      description: Filter by ref name(s), e.g. "main" or "v1.*" (supports * and ? wildcards)
      optional: true
      defaultValue: "*"
    git_ref_type:
      type: string
      description: Filter by ref type (can be "branch", "tag", "commit", or any with "*")
      optional: true
      defaultValue: "*"
